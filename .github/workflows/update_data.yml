name: Refresh Earth Pulse Data

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Fetch all data sources
        env:
          EIA_API_KEY:      ${{ secrets.EIA_API_KEY }}
          AGSI_KEY:         ${{ secrets.AGSI_KEY }}
          ACLED_EMAIL:      ${{ secrets.ACLED_EMAIL }}
          ACLED_PASSWORD:   ${{ secrets.ACLED_PASSWORD }}
          NASA_FIRMS_KEY:   ${{ secrets.NASA_FIRMS_KEY }}
          AIS_KEY:          ${{ secrets.AIS_KEY }}
          CF_RADAR_KEY:     ${{ secrets.CF_RADAR_KEY }}
        run: python fetch_data.py
      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "data: refresh $(date -u +%Y-%m-%dT%H:%M)Z"
          git push
